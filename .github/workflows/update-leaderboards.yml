name: Update Legacy Drive Leaderboards

on:
  workflow_dispatch:
  schedule:
    # 12:00 UTC = 6:00 AM Central Standard Time / 7:00 AM Central Daylight Time
    # Runs daily
    - cron: "0 12 * * *"

permissions:
  contents: write

jobs:
  update-leaderboards:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nfl_data_py pandas

      - name: Run legacy drives script
        run: python legacy-drive/legacy_drives.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add legacy-drive/*.html legacy-drive/*.json || true

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 1
          fi

          git commit -m "Update leaderboards (auto)"
          git push
